name: polski-b1

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polski
      POSTGRES_PASSWORD: polski
      POSTGRES_DB: polski
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polski"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy  # чекаємо готовності БД (alembic у entrypoint)
    restart: unless-stopped
    healthcheck:  # бот без порту — перевіряємо живий конект до Redis
      test: ["CMD-SHELL", "python -c \"import redis; redis.from_url('redis://redis:6379/0').ping()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  redis-data:
  pg-data:

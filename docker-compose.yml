name: polski-b1

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polski
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polski}  # прод: задати сильний у .env
      POSTGRES_DB: polski
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polski"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy  # чекаємо готовності БД (alembic у entrypoint)
    restart: unless-stopped
    healthcheck:  # внутрішній /health перевіряє живий конект до Postgres+Redis
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Публічний HTTPS для Mini App: named tunnel (Cloudflare Zero Trust) → bot:8080.
  # Public hostname (напр. polski.zelika.pl → http://bot:8080) налаштовується в
  # Cloudflare; сюди лише TUNNEL_TOKEN з .env. Профіль «tunnel» — щоб не стартувати
  # без токена: підняти командою `docker compose --profile tunnel up -d`.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - bot
    restart: unless-stopped
    profiles: ["tunnel"]

volumes:
  redis-data:
  pg-data:

name: polski-b1

# Ротація логів: під напливом json-file росте безмежно й забиває диск → обмежуємо.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    # maxmemory + noeviction: FSM-стан і лічильники НЕ витісняємо (краще явна помилка,
    # ніж тихо загублений стан). RDB-snapshot-точки як у дефолті — зберігаємо наявний
    # dump.rdb (БЕЗ appendonly, щоб не піднятись порожнім і не втратити стан).
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction", "--save", "3600", "1", "--save", "300", "100", "--save", "60", "10000"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polski
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polski}  # прод: задати сильний у .env
      POSTGRES_DB: polski
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polski"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy  # чекаємо готовності БД (alembic у entrypoint)
    restart: unless-stopped
    logging: *default-logging
    healthcheck:  # внутрішній /health перевіряє живий конект до Postgres+Redis
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Автобекап Postgres: щоденний pg_dump із ротацією (7 днів / 4 тижні / 6 міс) у ./backups.
  # Декларативно, окремим контейнером; відновлення — див. RUNBOOK.md.
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: polski
      POSTGRES_USER: polski
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polski}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups

  # Публічний HTTPS для Mini App: named tunnel (Cloudflare Zero Trust) → bot:8080.
  # Public hostname (напр. polski.zelika.pl → http://bot:8080) налаштовується в
  # Cloudflare; сюди лише TUNNEL_TOKEN з .env. Профіль «tunnel» — щоб не стартувати
  # без токена: підняти командою `docker compose --profile tunnel up -d`.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - bot
    restart: unless-stopped
    logging: *default-logging
    profiles: ["tunnel"]

  # Метрики хоста+контейнерів (CPU/RAM/диск/Postgres/Redis) + Telegram-алерти.
  # Opt-in: `docker compose --profile monitoring up -d netdata`. Дашборд — :19999.
  # Алерти: cp monitoring/netdata/health_alarm_notify.conf.example → .conf і впиши токен/chat.
  netdata:
    image: netdata/netdata:stable
    hostname: polski-homeserver
    pid: host
    network_mode: host
    restart: unless-stopped
    logging: *default-logging
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
    profiles: ["monitoring"]

volumes:
  redis-data:
  pg-data:
  netdata-lib:
  netdata-cache:

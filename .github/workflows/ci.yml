name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (з pyproject — єдине джерело; ML-екстра пропускаємо, імпорти ліниві)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile (syntax)
        run: python -m compileall -q src

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Types (mypy — чисте ядро)
        run: >
          mypy src/app/domain src/app/config.py src/app/bot/ui.py
          src/app/services/srs.py src/app/services/placement.py
          src/app/services/clock.py src/app/services/writing.py src/app/services/drills.py
          src/app/services/speaking.py src/app/services/listening/
          src/app/services/mock.py src/app/services/exam_dates.py src/app/services/plan.py
          src/app/services/progress.py src/app/services/access.py src/app/services/state.py
          src/app/services/limits.py src/app/services/badges.py src/app/services/guidance.py
          src/app/services/freefill.py src/app/services/opencheck.py src/app/services/billing.py
          src/app/services/admin_stats.py src/app/services/events.py src/app/services/resets.py src/app/services/support.py src/app/services/viewas.py src/app/services/broadcast.py src/app/services/groups.py src/app/services/leaderboard.py src/app/services/assignments.py src/app/services/churn.py src/app/services/activation.py src/app/services/experiments.py src/app/services/referrals.py src/app/services/eval_feedback.py src/app/services/aicost.py src/app/services/lexicon.py src/app/services/attribution.py src/app/services/heartbeat.py src/app/services/reading.py
          src/app/db/base.py src/app/db/models.py src/app/health.py src/app/scheduler.py src/app/integrations/ai.py

      - name: Tests (pytest + coverage gate)
        env:
          BOT_TOKEN: "test:token"
          PYTHONPATH: src
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=30

      - name: Security audit (pip-audit — не блокує)
        run: |
          pip install pip-audit
          pip-audit --desc || true

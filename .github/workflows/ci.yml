name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pytest-cov \
            aiogram redis "pydantic-settings>=2.5" tzdata anthropic

      - name: Compile (syntax)
        run: python -m compileall -q src

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Types (mypy — чисте ядро)
        run: >
          mypy src/app/domain src/app/config.py
          src/app/services/srs.py src/app/services/placement.py src/app/services/clock.py

      - name: Tests (pytest + coverage gate)
        env:
          BOT_TOKEN: "test:token"
          PYTHONPATH: src
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=30
